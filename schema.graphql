  type MessageResponse {
    success: Boolean!
    message: String!
  }

  type VerificationStatusResponse {
    status: VerificationStatus!
    canSubmit: Boolean!
    message: String!
  }

  type RefreshTokenResponse {
    accessToken: String!
    user: User!
  }

  type AdminRefreshTokenResponse {
    accessToken: String!
    admin: AdminUser!
  }

  type PaginatedUsers {
    items: [User!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  type PaginatedAdmins {
    items: [AdminUser!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  type PaginatedServices {
    items: [Service!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  type PaginatedCategories {
    items: [ServiceCategory!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  type PaginatedBookings {
    items: [Booking!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  # ==================
  # Input Types - User & Provider (Unified)
  # ==================

  input LoginInput {
    email: String!
    password: String!
  }

  input RegisterUserInput {
    email: String!
    password: String!
    firstName: String!
    lastName: String!
    phone: String
  }

  input VerifyEmailInput {
    email: String!
    otp: String!
  }

  input ResendOtpInput {
    email: String!
  }

  input ForgotPasswordInput {
    email: String!
  }

  input ResetPasswordInput {
    email: String!
    otp: String!
    newPassword: String!
  }

  input UpdateProfileInput {
    firstName: String
    lastName: String
    phone: String
    profilePhoto: String
  }

  input RequestEmailChangeInput {
    newEmail: String!
  }

  input ConfirmEmailChangeInput {
    otp: String!
  }

  input ChangePasswordInput {
    currentPassword: String!
    newPassword: String!
  }

  input PaginationInput {
    page: Int
    limit: Int
  }

