
  # ==================
  # Enums
  # ==================
  enum UserRole {
    SERVICE_USER
    SERVICE_PROVIDER
    ADMIN
    SUPER_ADMIN
  }

  enum AccountStatus {
    PENDING
    ACTIVE
    SUSPENDED
    DEACTIVATED
  }

  enum VerificationStatus {
    UNVERIFIED
    PENDING
    VERIFIED
    REJECTED
  }

  enum BookingStatus {
    PENDING
    ACCEPTED
    REJECTED
    IN_PROGRESS
    COMPLETED
    CANCELLED
    DISPUTED
  }

  enum PaymentStatus {
    PENDING
    PROCESSING
    COMPLETED
    FAILED
    REFUNDED
  }

  enum ServiceStatus {
    DRAFT
    PENDING_APPROVAL
    ACTIVE
    INACTIVE
    SUSPENDED
  }

  enum DisputeStatus {
    OPEN
    UNDER_REVIEW
    RESOLVED
    CLOSED
  }

  enum DisputeResolution {
    REFUND_FULL
    REFUND_PARTIAL
    NO_REFUND
    REDO_SERVICE
    MUTUAL_AGREEMENT
    DISMISSED
  }

  enum ConversationType {
    USER_PROVIDER
    USER_ADMIN
    ADMIN_SUPERADMIN
    BOOKING_RELATED
  }

  enum MessageStatus {
    SENT
    DELIVERED
    READ
  }

  enum NotificationType {
    BOOKING_CREATED
    BOOKING_ACCEPTED
    BOOKING_REJECTED
    BOOKING_CANCELLED
    BOOKING_STARTED
    BOOKING_COMPLETED
    PAYMENT_RECEIVED
    PAYMENT_FAILED
    REFUND_PROCESSED
    REVIEW_RECEIVED
    REVIEW_RESPONSE
    VERIFICATION_APPROVED
    VERIFICATION_REJECTED
    SERVICE_APPROVED
    SERVICE_REJECTED
    SERVICE_SUSPENDED
    DISPUTE_OPENED
    DISPUTE_UPDATED
    DISPUTE_RESOLVED
    NEW_MESSAGE
    ACCOUNT_SUSPENDED
    ACCOUNT_ACTIVATED
    SYSTEM_ANNOUNCEMENT
  }

  # Admin role enum (subset for creation)
  enum AdminRole {
    ADMIN
    SUPER_ADMIN
  }

  # ==================
  # Types
  # ==================
  
  # Service Provider Profile (embedded in User when role is SERVICE_PROVIDER)
  type ServiceProviderProfile {
    id: ID!
    businessName: String!
    businessDescription: String
    verificationStatus: VerificationStatus!
    address: String!
    city: String!
    state: String!
    country: String!
    latitude: Float
    longitude: Float
    documents: [String!]!
    images: [String!]!
    averageRating: Float
    totalReviews: Int
    likeCount: Int
    isLiked: Boolean
    createdAt: String!
    updatedAt: String!
  }

  # Service Category
  type ServiceCategory {
    id: ID!
    name: String!
    slug: String!
    description: String
    icon: String
    isActive: Boolean!
    createdAt: String!
    updatedAt: String!
  }

  # Service
  type Service {
    id: ID!
    provider: ServiceProviderProfile!
    category: ServiceCategory!
    name: String!
    slug: String!
    description: String!
    price: Float!
    duration: Int!
    status: ServiceStatus!
    images: [String!]!
    createdAt: String!
    updatedAt: String!
  }

  # Booking
  type Booking {
    id: ID!
    user: User!
    provider: ServiceProviderProfile!
    service: Service!
    status: BookingStatus!
    scheduledDate: String!
    scheduledTime: String!
    address: String!
    city: String!
    state: String!
    notes: String
    servicePrice: Float!
    commission: Float!
    totalAmount: Float!
    payment: Payment
    review: Review
    completedAt: String
    cancelledAt: String
    cancellationReason: String
    # Customer confirmation and payment release fields
    customerConfirmedAt: String
    paymentReleaseAt: String
    paymentReleasedAt: String
    createdAt: String!
    updatedAt: String!
  }

  # Payment
  type Payment {
    id: ID!
    bookingId: ID!
    amount: Float!
    commission: Float!
    providerPayout: Float!
    status: PaymentStatus!
    paymentMethod: String
    transactionRef: String
    paidAt: String
    refundedAt: String
    createdAt: String!
    updatedAt: String!
  }

  # Review
  type Review {
    id: ID!
    rating: Int!
    comment: String
    response: String
    respondedAt: String
    createdAt: String!
    updatedAt: String!
    user: ReviewUser
    provider: ReviewProvider
    booking: ReviewBooking
  }

  type ReviewUser {
    id: ID!
    firstName: String!
    lastName: String!
    email: String!
  }

  type ReviewProvider {
    id: ID!
    businessName: String!
    user: ReviewProviderUser
  }

  type ReviewProviderUser {
    id: ID!
    firstName: String!
    lastName: String!
  }

  type ReviewBooking {
    id: ID!
    scheduledDate: String!
    service: ReviewService
  }

  type ReviewService {
    id: ID!
    title: String!
  }

  # Paginated Reviews
  type PaginatedReviews {
    reviews: [Review!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  # Provider Rating Stats
  type ProviderRatingStats {
    averageRating: Float!
    totalReviews: Int!
    fiveStars: Int!
    fourStars: Int!
    threeStars: Int!
    twoStars: Int!
    oneStar: Int!
  }

  # Can Review Response
  type CanReviewResponse {
    canReview: Boolean!
    reason: String
  }

  # ==================
  # Favourite Types
  # ==================

  # Favourite
  type Favourite {
    id: ID!
    createdAt: String!
    service: FavouriteService
  }

  # Service details in favourite
  type FavouriteService {
    id: ID!
    name: String!
    slug: String!
    description: String!
    price: Float!
    duration: Int!
    status: ServiceStatus!
    images: [String!]!
    createdAt: String!
    updatedAt: String!
    category: FavouriteCategory
    provider: FavouriteProvider
  }

  type FavouriteCategory {
    id: ID!
    name: String!
    slug: String!
    icon: String
  }

  type FavouriteProvider {
    id: ID!
    businessName: String!
    verificationStatus: VerificationStatus!
    city: String!
    state: String!
    user: FavouriteProviderUser
  }

  type FavouriteProviderUser {
    id: ID!
    firstName: String!
    lastName: String!
  }

  # Paginated Favourites
  type PaginatedFavourites {
    favourites: [Favourite!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  # Is Favourited Response
  type IsFavouritedResponse {
    isFavourited: Boolean!
    favouriteId: ID
  }

  # Toggle Favourite Response
  type ToggleFavouriteResponse {
    isFavourited: Boolean!
    message: String!
  }

  # Service Favourite Count Response
  type ServiceFavouriteCountResponse {
    count: Int!
  }

  # ==================
  # Provider Like Types
  # ==================

  # Provider Like Response
  type ProviderLikeResponse {
    success: Boolean!
    message: String!
    likeCount: Int!
  }

  # Toggle Provider Like Response
  type ToggleProviderLikeResponse {
    success: Boolean!
    message: String!
    isLiked: Boolean!
    likeCount: Int!
  }

  # Is Provider Liked Response
  type IsProviderLikedResponse {
    isLiked: Boolean!
    likeCount: Int!
  }

  # Liked Provider Item
  type LikedProviderItem {
    id: ID!
    likedAt: String!
    provider: LikedProviderDetails!
  }

  # Liked Provider Details
  type LikedProviderDetails {
    id: ID!
    businessName: String!
    businessDescription: String
    verificationStatus: VerificationStatus!
    city: String!
    state: String!
    images: [String!]!
    user: LikedProviderUser
    reviewCount: Int!
    likeCount: Int!
  }

  # Liked Provider User
  type LikedProviderUser {
    id: ID!
    firstName: String!
    lastName: String!
    profilePhoto: String
  }

  # Paginated Liked Providers
  type PaginatedLikedProviders {
    items: [LikedProviderItem!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  # ==================
  # Browse / Discovery Types
  # ==================

  # A single provider card returned by browse/nearby queries
  type BrowseProviderItem {
    id: ID!
    businessName: String!
    businessDescription: String
    verificationStatus: VerificationStatus!
    address: String
    city: String!
    state: String!
    country: String!
    latitude: Float
    longitude: Float
    images: [String!]!
    averageRating: Float!
    totalReviews: Int!
    likeCount: Int!
    distanceKm: Float
    categories: [String!]!
    user: BrowseProviderUser
    createdAt: String!
    updatedAt: String!
  }

  type BrowseProviderUser {
    id: ID!
    firstName: String!
    lastName: String!
    profilePhoto: String
  }

  # Active service shown on a provider's full public profile
  type ProviderActiveService {
    id: ID!
    name: String!
    price: Float!
    duration: Int!
    images: [String!]!
    category: ServiceCategory
  }

  # Full public profile of a provider (for the detail page)
  type PublicProviderProfile {
    id: ID!
    businessName: String!
    businessDescription: String
    verificationStatus: VerificationStatus!
    address: String
    city: String!
    state: String!
    country: String!
    latitude: Float
    longitude: Float
    images: [String!]!
    averageRating: Float!
    totalReviews: Int!
    likeCount: Int!
    distanceKm: Float
    categories: [String!]!
    user: BrowseProviderUser
    activeServices: [ProviderActiveService!]!
    createdAt: String!
    updatedAt: String!
  }

  # Paginated browse results
  type PaginatedBrowseProviders {
    items: [BrowseProviderItem!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  # Paginated nearby results (includes search metadata)
  type PaginatedNearbyProviders {
    items: [BrowseProviderItem!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
    radiusKm: Float!
    searchLocation: SearchLocation!
  }

  type SearchLocation {
    latitude: Float!
    longitude: Float!
  }

  # ==================
  # Dispute Types
  # ==================

  # Dispute
  type Dispute {
    id: ID!
    reason: String!
    description: String!
    evidence: [String!]!
    status: DisputeStatus!
    raisedByRole: UserRole!
    resolution: DisputeResolution
    resolutionNotes: String
    refundAmount: Float
    resolvedAt: String
    createdAt: String!
    updatedAt: String!
    booking: DisputeBooking
  }

  type DisputeBooking {
    id: ID!
    status: BookingStatus!
    scheduledDate: String!
    scheduledTime: String!
    servicePrice: Float!
    totalAmount: Float!
    user: DisputeUser
    provider: DisputeProvider
    service: DisputeService
  }

  type DisputeUser {
    id: ID!
    firstName: String!
    lastName: String!
    email: String!
  }

  type DisputeProvider {
    id: ID!
    businessName: String!
    user: DisputeProviderUser
  }

  type DisputeProviderUser {
    id: ID!
    firstName: String!
    lastName: String!
    email: String!
  }

  type DisputeService {
    id: ID!
    name: String!
    price: Float!
  }

  # Paginated Disputes
  type PaginatedDisputes {
    disputes: [Dispute!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
  }

  # Open Disputes Count Response
  type OpenDisputesCountResponse {
    count: Int!
  }

  # Dispute Statistics
  type DisputeStats {
    total: Int!
    open: Int!
    underReview: Int!
    resolved: Int!
    closed: Int!
    pending: Int!
    resolutions: DisputeResolutionBreakdown
  }

  type DisputeResolutionBreakdown {
    REFUND_FULL: Int
    REFUND_PARTIAL: Int
    NO_REFUND: Int
    REDO_SERVICE: Int
    MUTUAL_AGREEMENT: Int
    DISMISSED: Int
  }

  # Booking Statistics
  type BookingStats {
    totalBookings: Int!
    pendingBookings: Int!
    completedBookings: Int!
    cancelledBookings: Int!
    totalRevenue: Float
    totalSpent: Float
    completionRate: Float
  }

  # User - unified for SERVICE_USER and SERVICE_PROVIDER
  type User {
    id: ID!
    email: String!
    firstName: String!
    lastName: String!
    phone: String
    profilePhoto: String
    role: UserRole!
    activeRole: UserRole!  # Current active mode (for role switching)
    status: AccountStatus!
    isEmailVerified: Boolean!
    pushEnabled: Boolean!   # Whether push notifications are enabled
    lastLoginAt: String     # ISO timestamp of last login
    # Provider profile is only populated when role is SERVICE_PROVIDER
    providerProfile: ServiceProviderProfile
    createdAt: String!
    updatedAt: String!
  }

  # Active Role Status
  type ActiveRoleStatus {
    currentRole: UserRole!
    activeRole: UserRole!
    canSwitch: Boolean!
    hasProviderProfile: Boolean!
    message: String!
  }

  # Admin User - separate type for clarity
  type AdminUser {
    id: ID!
    email: String!
    firstName: String!
    lastName: String!
    phone: String
    profilePhoto: String
    role: UserRole!
    status: AccountStatus!
    lastLoginAt: String
    createdAt: String!
    updatedAt: String!
  }

