    url: String!
    publicId: String!
    format: String!
    width: Int
    height: Int
    bytes: Int!
    resourceType: String!
  }

  # Profile photo upload response
  type ProfilePhotoResponse {
    success: Boolean!
    url: String!
    publicId: String!
    message: String!
  }

  # Multiple upload response
  type MultipleUploadResponse {
    success: Boolean!
